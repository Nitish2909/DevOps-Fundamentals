version: "3.9"  # compose file version

services:
  mongo:
    image: mongo:6  # official MongoDB image
    container_name: mongo_db  # custom container name
    restart: always  # restart if container stops
    ports:
      - "27017:27017"  # host:container port
    volumes:
      - mongo_data:/data/db  # persist database data

  backend:
    build: ./backend  # build from backend folder
    container_name: backend_server
    restart: always
    ports:
      - "5000:5000"  # expose backend API
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb  # connect to mongo service
    depends_on:
      - mongo  # start mongo first
    volumes:
      - ./backend:/app  # sync code (live changes)
    working_dir: /app  # set working directory
    command: ["node", "server.js"]  # run backend app

  frontend:
    build: ./frontend  # build from frontend folder
    container_name: frontend_client
    restart: always
    ports:
      - "3000:3000"  # React app port
    depends_on:
      - backend  # start after backend
    volumes:
      - ./frontend:/app  # sync frontend code
    working_dir: /app
    command: ["npm", "start"]  # start React app

volumes:
  mongo_data:  # named volume for MongoDB 